<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: arial, sans-serif;
            background-color: #ffffff;
            color: #202124;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Üst Menü */
        header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px 24px;
            font-size: 13px;
        }

        header a {
            color: rgba(0, 0, 0, 0.87);
            text-decoration: none;
            margin-right: 15px;
        }

        header a:hover {
            text-decoration: underline;
        }

        .apps-icon {
            padding: 4px;
            margin-right: 15px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
        }

        .apps-icon:hover {
            background-color: rgba(60, 64, 67, 0.08);
        }

        .sign-in-btn {
            background-color: #1a73e8;
            color: white !important;
            padding: 9px 23px;
            border-radius: 4px;
            font-weight: bold;
            text-decoration: none !important;
        }

        /* Orta Alan */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin-top: -40px;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
        }

        .logo {
            max-width: 100%;
            height: auto;
        }

        .search-form {
            width: 100%;
            max-width: 584px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-container {
            width: 100%;
            position: relative;
        }

        .search-box {
            width: 100%;
            height: 46px;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            padding: 0 110px 0 45px;
            font-size: 16px;
            color: #000;
            outline: none;
            transition: box-shadow 0.1s;
        }

        .search-box:hover, .search-box:focus {
            background-color: #fff;
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 13px;
            width: 20px;
            height: 20px;
            fill: #9aa0a6;
        }

        .icon-group {
            position: absolute;
            right: 14px;
            top: 11px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-group svg {
            width: 24px;
            height: 24px;
        }

        .buttons-container {
            margin-top: 29px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-direction: column;
        }

        .row-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            padding: 0 16px;
            line-height: 27px;
            height: 36px;
            min-width: 54px;
            text-align: center;
            cursor: pointer;
        }

        .btn:hover {
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            border: 1px solid #dadce0;
            color: #202124;
        }

        .creator-subtext {
            font-size: 12px;
            color: #70757a;
            margin-top: 12px;
            font-style: italic;
        }

        .languages {
            font-size: 13px;
            margin-top: 28px;
        }

        .languages a {
            color: #1a0dab;
            text-decoration: none;
        }

        /* Alt Bilgi (Footer) */
        footer {
            background-color: #f2f2f2;
            font-size: 14px;
            color: #70757a;
            width: 100%;
        }

        .footer-top {
            padding: 15px 30px;
            border-bottom: 1px solid #dadce0;
        }

        .footer-bottom {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            padding: 15px 20px;
            align-items: center;
        }

        .footer-links-left, .footer-links-right {
            display: flex;
            gap: 27px;
        }

        .enes-signature {
            font-weight: bold;
            color: #1a73e8;
            font-size: 13px;
        }

        footer a {
            color: #70757a;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .footer-bottom {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="https://mail.google.com">Gmail</a>
        <a href="https://www.google.com.tr/imghp">Görseller</a>
        <div class="apps-icon">
            <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M6 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm8 12c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-8 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0-4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm8 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm4-12c-1.1 0-2 .9-2 2 s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-8 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm8 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"></path></svg>
        </div>
        <a href="https://accounts.google.com" class="sign-in-btn">Oturum açın</a>
    </header>

    <main>
        <div class="logo-container">
            <img class="logo" src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo" width="272" height="92">
        </div>
        
        <form class="search-form" action="https://www.google.com/search" method="GET">
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
                
                <input type="text" name="q" class="search-box" autocomplete="off" autofocus required>
                
                <div class="icon-group">
                    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="m12 15c1.66 0 3-1.31 3-2.97v-7.06c0-1.65-1.34-2.97-3-2.97s-3 1.32-3 2.97v7.06c0 1.66 1.34 2.97 3 2.97z"/><path fill="#EA4335" d="m11 18.08h2v3.92h-2z"/><path fill="#FBBC05" d="m7.05 16.87c-1.28-1.25-2.05-2.97-2.05-4.87h2c0 1.35.54 2.59 1.42 3.5l-1.37 1.37z"/><path fill="#34A853" d="m12 19c-2.76 0-5.26-1.11-7.07-2.9l1.42-1.42c1.45 1.45 3.44 2.32 5.65 2.32 4.42 0 8-3.58 8-8h2c0 5.03-3.71 9.21-8.5 9.93z"/></svg>
                    <svg viewBox="0 0 192 192"><g fill="none" stroke="#4285f4" stroke-linecap="round" stroke-linejoin="round" stroke-width="12"><path d="M25,65 L25,45 C25,33.95 33.95,25 45,25 L65,25"/><path d="M127,25 L147,25 C158.05,25 167,33.95 167,45 L167,65"/><path d="M167,127 L167,147 C167,158.05 158.05,167 147,167 L127,167"/><path d="M65,167 L45,167 C33.95,167 25,158.05 25,147 L25,127"/></g><circle cx="96" cy="96" fill="#4285f4" r="24"/><path d="M135,115 C135,115 145,115 145,105 C145,95 135,95 135,95" fill="none" stroke="#ea4335" stroke-linecap="round" stroke-width="12"/><circle cx="68" cy="68" fill="#34a853" r="10"/></svg>
                </div>
            </div>

            <div class="buttons-container">
                <div class="row-buttons">
                    <button type="submit" class="btn">Google'da Ara</button>
                    <button type="button" class="btn" onclick="location.href='https://doodles.google/'">Kendimi Şanslı Hissediyorum</button>
                </div>
                <div class="creator-subtext">Enes tarafından yapılmıştır.</div>
            </div>
        </form>

        <div class="languages">
            Google'ın sunulduğu diğer diller: <a href="https://www.google.com/setprefs?hl=en">English</a>
        </div>
    </main>

    <footer>
        <div class="footer-top">
            Türkiye
        </div>
        <div class="footer-bottom">
            <div class="footer-links-left">
                <a href="https://about.google">Hakkında</a>
                <a href="https://ads.google.com">Reklam</a>
                <a href="https://www.google.com/services">İşletme</a>
                <a href="https://google.com/search/howsearchworks">Arama nasıl çalışır?</a>
            </div>
            
            <div class="enes-signature">Enes tarafından yapılmıştır.</div>
            
            <div class="footer-links-right">
                <a href="https://policies.google.com/privacy">Gizlilik</a>
                <a href="https://policies.google.com/terms">Şartlar</a>
                <a href="#">Ayarlar</a>
            </div>
        </div>
    </footer>

</body>
</html>
